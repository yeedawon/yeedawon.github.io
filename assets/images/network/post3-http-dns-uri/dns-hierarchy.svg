<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <defs>
    <style>
      body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .title { font-size: 20px; font-weight: bold; fill: #333; }
      .subtitle { font-size: 14px; fill: #333; font-weight: 600; }
      .text { font-size: 13px; fill: #333; }
      .small { font-size: 11px; fill: #999; }
      .label { font-size: 12px; fill: #666; font-weight: 500; }
      .code { font-size: 12px; font-family: "Courier New", monospace; fill: #d73a49; }
      .arrow { fill: none; stroke: #333; stroke-width: 2; marker-end: url(#arrowhead); }
      .arrow-thick { fill: none; stroke: #333; stroke-width: 2.5; marker-end: url(#arrowhead); }
      .arrow-dashed { fill: none; stroke: #333; stroke-width: 2; stroke-dasharray: 5,5; marker-end: url(#arrowhead); }
      .box { fill: #fff; stroke: #ddd; stroke-width: 1.5; }
      .box-highlight { fill: #e8f4f8; stroke: #ddd; stroke-width: 1.5; }
      .box-response { fill: #f0f5e8; stroke: #ddd; stroke-width: 1.5; }
      .box-uri { fill: #fff3e0; stroke: #ddd; stroke-width: 1.5; }
      .box-dns { fill: #f3e5f5; stroke: #ddd; stroke-width: 1.5; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#333" />
    </marker>
  </defs>
<text x="400" y="35" text-anchor="middle" class="title">DNS 계층 구조</text><rect x="350" y="70" width="100" height="50" rx="8" class="box-dns" /><text x="400" y="100" text-anchor="middle" class="text">. (루트 도메인)</text><line x1="400" y1="120" x2="400" y2="160" stroke="#ddd" stroke-width="1" /><line x1="300" y1="160" x2="500" y2="160" stroke="#ddd" stroke-width="1" /><rect x="250" y="160" width="100" height="50" rx="8" class="box-dns" /><text x="300" y="190" text-anchor="middle" class="text">com (TLD)</text><line x1="300" y1="210" x2="300" y2="250" stroke="#ddd" stroke-width="1" /><rect x="225" y="250" width="150" height="50" rx="8" class="box-dns" /><text x="300" y="280" text-anchor="middle" class="text">example (2단계)</text><line x1="300" y1="300" x2="300" y2="340" stroke="#ddd" stroke-width="1" /><rect x="225" y="340" width="150" height="50" rx="8" class="box-dns" /><text x="300" y="370" text-anchor="middle" class="text">www (서브도메인)</text><rect x="150" y="420" width="300" height="50" rx="8" class="box" /><text x="300" y="450" text-anchor="middle" class="code">www.example.com.</text><text x="400" y="520" text-anchor="middle" class="small">각 부분은 점(.)으로 구분되며, 우측에서 좌측으로 읽음</text><text x="400" y="545" text-anchor="middle" class="text">루트 → TLD → 2단계 → 서브도메인</text></svg>
<?xml version="1.0" encoding="UTF-8"?>
<svg width="900" height="500" viewBox="0 0 900 500" xmlns="http://www.w3.org/2000/svg">
    <rect width="900" height="500" fill="#fff"/>

    <defs>
        <style>
            body { font-family: '-apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif'; }
            .title { font-size: 18px; font-weight: 600; fill: #333; }
            .label { font-size: 14px; fill: #333; }
            .subtext { font-size: 12px; fill: #666; }
            .code { font-size: 12px; fill: #333; font-family: monospace; }
            .header { font-size: 16px; font-weight: 600; fill: #333; }
            .box { stroke: #ddd; stroke-width: 1.5; fill: #f9f9f9; rx: 8; }
            .box-header { stroke: #ddd; stroke-width: 1.5; fill: #f5f5f5; rx: 8; }
            .arrow { stroke: #666; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
            .dashed { stroke-dasharray: 5,5; }
            .text-center { text-anchor: middle; }
            .network-box { stroke: #999; stroke-width: 2; fill: #f9f9f9; rx: 8; }
            .address { font-size: 13px; font-family: monospace; fill: #333; }
        </style>
        <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
            <polygon points="0 0, 10 3, 0 6" fill="#666" />
        </marker>
    </defs>


    <!-- Title -->
    <text x="450" y="40" class="title text-center">NAT (Network Address Translation)</text>
    
    <!-- Internal Network -->
    <g id="internal-network">
        <rect x="30" y="80" width="200" height="300" class="network-box"/>
        <text x="130" y="110" class="header text-center">내부 네트워크</text>
        
        <!-- PC-A -->
        <rect x="50" y="140" width="160" height="45" class="box"/>
        <text x="130" y="160" class="label text-center">PC-A</text>
        <text x="130" y="177" class="address text-center">10.0.0.5</text>
        
        <!-- PC-B -->
        <rect x="50" y="210" width="160" height="45" class="box"/>
        <text x="130" y="230" class="label text-center">PC-B</text>
        <text x="130" y="247" class="address text-center">10.0.0.6</text>
        
        <!-- PC-C -->
        <rect x="50" y="280" width="160" height="45" class="box"/>
        <text x="130" y="300" class="label text-center">PC-C</text>
        <text x="130" y="317" class="address text-center">10.0.0.7</text>
    </g>
    
    <!-- NAT/Router -->
    <g id="nat-router">
        <rect x="320" y="80" width="240" height="300" class="network-box"/>
        <text x="440" y="110" class="header text-center">라우터 / NAT</text>
        
        <!-- NAT Table -->
        <rect x="340" y="140" width="200" height="40" class="box"/>
        <text x="440" y="155" class="label text-center">사설 IP → 공인 IP</text>
        <text x="440" y="170" class="subtext text-center">NAT 변환 테이블</text>
        
        <!-- Public IP -->
        <rect x="340" y="210" width="200" height="50" class="box"/>
        <text x="440" y="230" class="label text-center">공인 IP</text>
        <text x="440" y="250" class="address text-center">203.0.113.1</text>
        
        <!-- Process description -->
        <text x="440" y="290" class="subtext text-center">사설 IP를 공인 IP로</text>
        <text x="440" y="310" class="subtext text-center">변환하여 인터넷 접속</text>
    </g>
    
    <!-- Internet/Server -->
    <g id="internet">
        <rect x="650" y="150" width="150" height="200" class="network-box"/>
        <text x="727" y="185" class="header text-center">인터넷</text>
        <text x="727" y="230" class="subtext text-center">(서버)</text>
        <text x="727" y="270" class="address text-center">203.0.113.100</text>
    </g>
    
    <!-- Arrows -->
    <line x1="230" y1="162" x2="320" y2="162" class="arrow"/>
    <line x1="230" y1="232" x2="320" y2="232" class="arrow"/>
    <line x1="230" y1="302" x2="320" y2="302" class="arrow"/>
    
    <line x1="560" y1="230" x2="650" y2="230" class="arrow"/>
    <line x1="650" y1="250" x2="560" y2="270" class="arrow"/>
</svg>
<?xml version="1.0" encoding="UTF-8"?>
<svg width="800" height="700" viewBox="0 0 800 700" xmlns="http://www.w3.org/2000/svg">
    <rect width="800" height="700" fill="#fff"/>

    <defs>
        <style>
            body { font-family: '-apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif'; }
            .title { font-size: 18px; font-weight: 600; fill: #333; }
            .label { font-size: 14px; fill: #333; }
            .subtext { font-size: 12px; fill: #666; }
            .code { font-size: 12px; fill: #333; font-family: monospace; }
            .header { font-size: 16px; font-weight: 600; fill: #333; }
            .box { stroke: #ddd; stroke-width: 1.5; fill: #f9f9f9; rx: 8; }
            .box-header { stroke: #ddd; stroke-width: 1.5; fill: #f5f5f5; rx: 8; }
            .arrow { stroke: #666; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
            .dashed { stroke-dasharray: 5,5; }
            .text-center { text-anchor: middle; }
            .network-box { stroke: #999; stroke-width: 2; fill: #f9f9f9; rx: 8; }
            .address { font-size: 13px; font-family: monospace; fill: #333; }
        </style>
        <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
            <polygon points="0 0, 10 3, 0 6" fill="#666" />
        </marker>
    </defs>


    <!-- Title -->
    <text x="400" y="40" class="title text-center">DHCP (Dynamic Host Configuration Protocol)</text>
    
    <!-- Client column -->
    <rect x="50" y="80" width="150" height="550" class="box-header"/>
    <text x="125" y="110" class="header text-center">클라이언트</text>
    
    <!-- Server column -->
    <rect x="600" y="80" width="150" height="550" class="box-header"/>
    <text x="675" y="110" class="header text-center">DHCP 서버</text>
    
    <!-- Step 1: DHCP Discover -->
    <g id="step1">
        <circle cx="125" cy="150" r="6" fill="#333"/>
        <line x1="125" y1="150" x2="675" y2="190" class="arrow" stroke="#0066cc"/>
        <text x="350" y="170" class="label text-center">① DHCP Discover (Broadcast)</text>
        <text x="350" y="190" class="subtext text-center">"IP 주소를 줄 수 있는 서버가 있나요?"</text>
    </g>
    
    <!-- Step 2: DHCP Offer -->
    <g id="step2">
        <circle cx="675" cy="240" r="6" fill="#333"/>
        <line x1="675" y1="240" x2="125" y2="280" class="arrow" stroke="#00cc00"/>
        <text x="350" y="260" class="label text-center">② DHCP Offer</text>
        <text x="350" y="280" class="subtext text-center">"이 IP를 드릴게요: 192.168.1.100"</text>
        <text x="350" y="300" class="subtext text-center">서브넷: 255.255.255.0, 게이트웨이: 192.168.1.1, DNS: 8.8.8.8</text>
    </g>
    
    <!-- Step 3: DHCP Request -->
    <g id="step3">
        <circle cx="125" cy="350" r="6" fill="#333"/>
        <line x1="125" y1="350" x2="675" y2="390" class="arrow" stroke="#ff9900"/>
        <text x="350" y="370" class="label text-center">③ DHCP Request (Broadcast)</text>
        <text x="350" y="390" class="subtext text-center">"제안받은 192.168.1.100을 사용하겠습니다"</text>
    </g>
    
    <!-- Step 4: DHCP ACK -->
    <g id="step4">
        <circle cx="675" cy="440" r="6" fill="#333"/>
        <line x1="675" y1="440" x2="125" y2="480" class="arrow" stroke="#00cc66"/>
        <text x="350" y="460" class="label text-center">④ DHCP ACK</text>
        <text x="350" y="480" class="subtext text-center">"확인했습니다. 이 설정으로 사용하세요!"</text>
    </g>
    
    <!-- Result -->
    <g id="result">
        <rect x="50" y="550" width="700" height="70" class="box"/>
        <text x="400" y="575" class="header text-center">클라이언트가 IP 설정 완료</text>
        <text x="400" y="600" class="subtext text-center">IP: 192.168.1.100, 서브넷: 255.255.255.0, 게이트웨이: 192.168.1.1</text>
    </g>
</svg>
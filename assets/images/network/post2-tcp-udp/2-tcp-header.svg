<svg width="800" height="450" viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <style>
    body { background-color: #ffffff; }
    .bg { fill: #ffffff; }
    text { fill: #333; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 14px; }
    .label { font-size: 12px; }
    .title { font-size: 18px; font-weight: bold; }
    .subtitle { font-size: 13px; font-weight: 600; }
    .box { fill: #ffffff; stroke: #ddd; stroke-width: 2; rx: 8; }
    .header-cell { fill: #ffffff; stroke: #ddd; stroke-width: 1; }
    .arrow { stroke: #333; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
    .dashed { stroke-dasharray: 5,5; }
    .lost { stroke: #ff0000; stroke-width: 3; }
    .line { stroke: #333; stroke-width: 1; }
    .timeline { stroke: #333; stroke-width: 2; }
  </style>
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#333" />
    </marker>
  </defs>
  <rect class="bg" width="800" height="450"/>

  <text x="400" y="30" text-anchor="middle" class="title">TCP 세그먼트 헤더</text>
  
  <!-- Header table -->
  <g id="tcp-header">
    <!-- Row 1: Source and Destination Port -->
    <rect x="100" y="70" width="300" height="60" class="header-cell"/>
    <text x="250" y="105" text-anchor="middle" class="label">송신지 포트 (16 bit)</text>
    
    <rect x="400" y="70" width="300" height="60" class="header-cell"/>
    <text x="550" y="105" text-anchor="middle" class="label">수신지 포트 (16 bit)</text>
    
    <!-- Row 2: Sequence Number -->
    <rect x="100" y="130" width="600" height="60" class="header-cell"/>
    <text x="400" y="165" text-anchor="middle" class="label">순서 번호 (Sequence Number, 32 bit)</text>
    
    <!-- Row 3: Acknowledgement Number -->
    <rect x="100" y="190" width="600" height="60" class="header-cell"/>
    <text x="400" y="225" text-anchor="middle" class="label">확인 응답 번호 (Acknowledgement Number, 32 bit)</text>
    
    <!-- Row 4: Data Offset, Reserved, Control Bits, Window -->
    <rect x="100" y="250" width="90" height="60" class="header-cell"/>
    <text x="145" y="285" text-anchor="middle" font-size="11px">데이터</text>
    <text x="145" y="298" text-anchor="middle" font-size="11px">오프셋</text>
    
    <rect x="190" y="250" width="60" height="60" class="header-cell"/>
    <text x="220" y="285" text-anchor="middle" font-size="11px">예약</text>
    
    <rect x="250" y="250" width="180" height="60" class="header-cell"/>
    <text x="340" y="270" text-anchor="middle" font-size="11px">제어 비트</text>
    <text x="340" y="285" text-anchor="middle" font-size="10px">SYN ACK FIN</text>
    
    <rect x="430" y="250" width="270" height="60" class="header-cell"/>
    <text x="565" y="285" text-anchor="middle" class="label">수신 윈도우 (rwnd)</text>
    
    <!-- Row 5: Checksum and Urgent Pointer -->
    <rect x="100" y="310" width="300" height="60" class="header-cell"/>
    <text x="250" y="345" text-anchor="middle" class="label">체크섬</text>
    
    <rect x="400" y="310" width="300" height="60" class="header-cell"/>
    <text x="550" y="345" text-anchor="middle" class="label">긴급 포인터</text>
  </g>

</svg>
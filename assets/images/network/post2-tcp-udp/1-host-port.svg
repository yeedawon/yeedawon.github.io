<svg width="800" height="400" viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
  <style>
    body { background-color: #ffffff; }
    .bg { fill: #ffffff; }
    text { fill: #333; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 14px; }
    .label { font-size: 12px; }
    .title { font-size: 18px; font-weight: bold; }
    .subtitle { font-size: 13px; font-weight: 600; }
    .box { fill: #ffffff; stroke: #ddd; stroke-width: 2; rx: 8; }
    .header-cell { fill: #ffffff; stroke: #ddd; stroke-width: 1; }
    .arrow { stroke: #333; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
    .dashed { stroke-dasharray: 5,5; }
    .lost { stroke: #ff0000; stroke-width: 3; }
    .line { stroke: #333; stroke-width: 1; }
    .timeline { stroke: #333; stroke-width: 2; }
  </style>
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#333" />
    </marker>
  </defs>
  <rect class="bg" width="800" height="400"/>

  <text x="400" y="30" text-anchor="middle" class="title">호스트와 포트</text>
  
  <!-- Host A Box -->
  <rect x="50" y="80" width="280" height="200" class="box"/>
  <text x="190" y="105" text-anchor="middle" class="subtitle">호스트 A</text>
  <line x1="50" y1="110" x2="330" y2="110" class="line"/>
  
  <text x="70" y="135" class="label">Chrome</text>
  <text x="280" y="135" text-anchor="end" class="label">:52341</text>
  
  <text x="70" y="165" class="label">카카오톡</text>
  <text x="280" y="165" text-anchor="end" class="label">:52342</text>
  
  <text x="70" y="195" class="label">VS Code</text>
  <text x="280" y="195" text-anchor="end" class="label">:52343</text>
  
  <text x="190" y="240" text-anchor="middle" class="label">IP 192.168.1.5</text>
  
  <!-- Host B Box -->
  <rect x="470" y="80" width="280" height="200" class="box"/>
  <text x="610" y="105" text-anchor="middle" class="subtitle">호스트 B</text>
  <line x1="470" y1="110" x2="750" y2="110" class="line"/>
  
  <text x="490" y="135" class="label">nginx</text>
  <text x="730" y="135" text-anchor="end" class="label">:80</text>
  
  <text x="490" y="165" class="label">Spring</text>
  <text x="730" y="165" text-anchor="end" class="label">:8080</text>
  
  <text x="490" y="195" class="label">MySQL</text>
  <text x="730" y="195" text-anchor="end" class="label">:3306</text>
  
  <text x="610" y="240" text-anchor="middle" class="label">IP 192.168.1.10</text>
  
  <!-- Arrow between hosts -->
  <path d="M 330 180 L 470 180" class="arrow"/>
  <path d="M 470 200 L 330 200" class="arrow"/>
  <text x="400" y="175" text-anchor="middle" class="label">TCP/UDP</text>
  
  <!-- Bottom explanations -->
  <text x="50" y="340" class="label" font-weight="600">네트워크 계층 → 호스트 식별 (IP)</text>
  <text x="50" y="365" class="label" font-weight="600">전송 계층 → 프로세스 식별 (Port)</text>

</svg>
<svg width="800" height="500" viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <style>
    body { background-color: #ffffff; }
    .bg { fill: #ffffff; }
    text { fill: #333; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 14px; }
    .label { font-size: 12px; }
    .title { font-size: 18px; font-weight: bold; }
    .subtitle { font-size: 13px; font-weight: 600; }
    .box { fill: #ffffff; stroke: #ddd; stroke-width: 2; rx: 8; }
    .header-cell { fill: #ffffff; stroke: #ddd; stroke-width: 1; }
    .arrow { stroke: #333; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
    .dashed { stroke-dasharray: 5,5; }
    .lost { stroke: #ff0000; stroke-width: 3; }
    .line { stroke: #333; stroke-width: 1; }
    .timeline { stroke: #333; stroke-width: 2; }
  </style>
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#333" />
    </marker>
  </defs>
  <rect class="bg" width="800" height="500"/>

  <text x="400" y="30" text-anchor="middle" class="title">TCP Slow Start & Congestion Avoidance</text>
  
  <!-- Axes -->
  <line x1="100" y1="400" x2="750" y2="400" class="line" stroke-width="2"/>
  <line x1="100" y1="400" x2="100" y2="80" class="line" stroke-width="2"/>
  
  <!-- Axis labels -->
  <text x="95" y="420" text-anchor="end" class="label">cwnd</text>
  <text x="770" y="405" class="label">시간 (RTT)</text>
  
  <!-- Y-axis values -->
  <text x="90" y="405" text-anchor="end" class="label" font-size="11">0</text>
  <text x="90" y="355" text-anchor="end" class="label" font-size="11">8</text>
  <text x="90" y="305" text-anchor="end" class="label" font-size="11">16</text>
  <text x="90" y="255" text-anchor="end" class="label" font-size="11">32</text>
  
  <!-- X-axis values -->
  <text x="100" y="425" text-anchor="middle" class="label" font-size="11">0</text>
  <text x="200" y="425" text-anchor="middle" class="label" font-size="11">1</text>
  <text x="300" y="425" text-anchor="middle" class="label" font-size="11">2</text>
  <text x="400" y="425" text-anchor="middle" class="label" font-size="11">3</text>
  <text x="500" y="425" text-anchor="middle" class="label" font-size="11">4</text>
  
  <!-- Grid lines -->
  <line x1="100" y1="355" x2="750" y2="355" class="line" stroke-dasharray="3,3" stroke-width="1" opacity="0.5"/>
  <line x1="100" y1="305" x2="750" y2="305" class="line" stroke-dasharray="3,3" stroke-width="1" opacity="0.5"/>
  <line x1="100" y1="255" x2="750" y2="255" class="line" stroke-dasharray="3,3" stroke-width="1" opacity="0.5"/>
  
  <!-- Slow Start curve (exponential) -->
  <path d="M 100 400 L 150 375 L 200 355 L 250 305" class="arrow" stroke="#0066cc" stroke-width="3" marker-end="none"/>
  <text x="260" y="300" class="label" fill="#0066cc">Slow Start</text>
  <text x="260" y="315" class="label" fill="#0066cc">(지수 증가)</text>
  
  <!-- ssthresh mark -->
  <line x1="100" y1="305" x2="750" y2="305" class="line" stroke="#ff9900" stroke-width="2" stroke-dasharray="5,5"/>
  <text x="760" y="310" class="label" fill="#ff9900">ssthresh</text>
  
  <!-- Congestion Avoidance curve (linear) -->
  <path d="M 250 305 L 350 275 L 450 250 L 550 225 L 650 200 L 750 175" class="arrow" stroke="#00cc00" stroke-width="3" marker-end="none"/>
  <text x="560" y="165" class="label" fill="#00cc00">Congestion</text>
  <text x="560" y="180" class="label" fill="#00cc00">Avoidance</text>
  <text x="560" y="195" class="label" fill="#00cc00">(선형 증가)</text>
  
  <!-- Legend -->
  <rect x="50" y="450" width="700" height="30" class="box"/>
  <text x="70" y="470" class="label">cwnd: 혼잡 윈도우 | ssthresh: 느린 시작 임계값</text>

</svg>
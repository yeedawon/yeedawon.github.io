<svg width="800" height="520" viewBox="0 0 800 520" xmlns="http://www.w3.org/2000/svg">
  <style>
    body { background-color: #ffffff; }
    .bg { fill: #ffffff; }
    text { fill: #333; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 14px; }
    .label { font-size: 12px; }
    .title { font-size: 18px; font-weight: bold; }
    .subtitle { font-size: 13px; font-weight: 600; }
    .box { fill: #ffffff; stroke: #ddd; stroke-width: 2; rx: 8; }
    .header-cell { fill: #ffffff; stroke: #ddd; stroke-width: 1; }
    .arrow { stroke: #333; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
    .dashed { stroke-dasharray: 5,5; }
    .lost { stroke: #ff0000; stroke-width: 3; }
    .line { stroke: #333; stroke-width: 1; }
    .timeline { stroke: #333; stroke-width: 2; }
  </style>
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#333" />
    </marker>
  </defs>
  <rect class="bg" width="800" height="520"/>

  <text x="400" y="30" text-anchor="middle" class="title">TCP 4-way Handshake (연결 종료)</text>
  
  <!-- Timelines -->
  <line x1="150" y1="80" x2="150" y2="460" class="timeline"/>
  <line x1="650" y1="80" x2="650" y2="460" class="timeline"/>
  
  <!-- Host labels -->
  <text x="150" y="60" text-anchor="middle" class="subtitle">호스트 A</text>
  <text x="150" y="75" text-anchor="middle" class="label">(active close)</text>
  
  <text x="650" y="60" text-anchor="middle" class="subtitle">호스트 B</text>
  <text x="650" y="75" text-anchor="middle" class="label">(passive close)</text>
  
  <!-- Initial state -->
  <text x="150" y="110" text-anchor="middle" class="label">[ESTABLISHED]</text>
  <text x="650" y="110" text-anchor="middle" class="label">[ESTABLISHED]</text>
  
  <!-- Arrow 1: FIN -->
  <path d="M 160 150 L 640 150" class="arrow"/>
  <text x="400" y="145" text-anchor="middle" class="label" font-weight="600">① FIN</text>
  
  <!-- State after FIN -->
  <text x="150" y="185" text-anchor="middle" class="label">[FIN_WAIT_1]</text>
  <text x="650" y="185" text-anchor="middle" class="label">[CLOSE_WAIT]</text>
  
  <!-- Arrow 2: ACK -->
  <path d="M 640 220 L 160 220" class="arrow"/>
  <text x="400" y="215" text-anchor="middle" class="label" font-weight="600">② ACK</text>
  
  <!-- State after ACK -->
  <text x="150" y="255" text-anchor="middle" class="label">[FIN_WAIT_2]</text>
  <text x="650" y="255" text-anchor="middle" class="label">[CLOSE_WAIT]</text>
  
  <!-- Arrow 3: FIN -->
  <path d="M 640 290 L 160 290" class="arrow"/>
  <text x="400" y="285" text-anchor="middle" class="label" font-weight="600">③ FIN</text>
  
  <!-- State after FIN -->
  <text x="150" y="325" text-anchor="middle" class="label">[TIME_WAIT]</text>
  <text x="650" y="325" text-anchor="middle" class="label">[LAST_ACK]</text>
  
  <!-- Arrow 4: ACK -->
  <path d="M 160 360 L 640 360" class="arrow"/>
  <text x="400" y="355" text-anchor="middle" class="label" font-weight="600">④ ACK</text>
  
  <!-- Final states -->
  <text x="150" y="400" text-anchor="middle" class="label">[CLOSED]</text>
  <text x="650" y="400" text-anchor="middle" class="label">[CLOSED]</text>

</svg>
<svg width="800" height="500" viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <style>
    body { background-color: #ffffff; }
    .bg { fill: #ffffff; }
    text { fill: #333; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 14px; }
    .label { font-size: 12px; }
    .title { font-size: 18px; font-weight: bold; }
    .subtitle { font-size: 13px; font-weight: 600; }
    .box { fill: #ffffff; stroke: #ddd; stroke-width: 2; rx: 8; }
    .header-cell { fill: #ffffff; stroke: #ddd; stroke-width: 1; }
    .arrow { stroke: #333; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
    .dashed { stroke-dasharray: 5,5; }
    .lost { stroke: #ff0000; stroke-width: 3; }
    .line { stroke: #333; stroke-width: 1; }
    .timeline { stroke: #333; stroke-width: 2; }
  </style>
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#333" />
    </marker>
  </defs>
  <rect class="bg" width="800" height="500"/>

  <text x="400" y="30" text-anchor="middle" class="title">Sliding Window (흐름 제어)</text>
  
  <!-- Step 1 -->
  <text x="50" y="80" class="subtitle">Step 1: 초기 전송</text>
  <g id="step1">
    <rect x="100" y="100" width="40" height="40" class="box"/>
    <text x="120" y="125" text-anchor="middle" class="label">1</text>
    <rect x="150" y="100" width="40" height="40" class="box"/>
    <text x="170" y="125" text-anchor="middle" class="label">2</text>
    <rect x="200" y="100" width="40" height="40" class="box"/>
    <text x="220" y="125" text-anchor="middle" class="label">3</text>
    <rect x="250" y="100" width="40" height="40" class="box"/>
    <text x="270" y="125" text-anchor="middle" class="label">4</text>
    <text x="350" y="125" class="label">← 송신 윈도우 (크기: 4)</text>
  </g>
  
  <!-- ACK for segment 3 -->
  <text x="50" y="180" class="label">수신: ACK(3), rwnd=4</text>
  <path d="M 80 165 L 380 165" class="arrow"/>
  
  <!-- Step 2 -->
  <text x="50" y="220" class="subtitle">Step 2: ACK 수신 후</text>
  <g id="step2">
    <rect x="200" y="240" width="40" height="40" class="box"/>
    <text x="220" y="265" text-anchor="middle" class="label">3</text>
    <rect x="250" y="240" width="40" height="40" class="box"/>
    <text x="270" y="265" text-anchor="middle" class="label">4</text>
    <rect x="300" y="240" width="40" height="40" class="box"/>
    <text x="320" y="265" text-anchor="middle" class="label">5</text>
    <rect x="350" y="240" width="40" height="40" class="box"/>
    <text x="370" y="265" text-anchor="middle" class="label">6</text>
    <rect x="400" y="240" width="40" height="40" class="box"/>
    <text x="420" y="265" text-anchor="middle" class="label">7</text>
    <text x="500" y="265" class="label">← 윈도우 슬라이딩</text>
  </g>
  
  <!-- ACK for segment 7 -->
  <text x="50" y="320" class="label">수신: ACK(7), rwnd=2</text>
  <path d="M 80 305 L 500 305" class="arrow"/>
  
  <!-- Benefits -->
  <rect x="50" y="360" width="700" height="100" class="box"/>
  <text x="400" y="385" text-anchor="middle" class="label" font-weight="600">효과</text>
  <text x="70" y="410" class="label">• ACK를 기다리지 않고 여러 세그먼트 미리 전송</text>
  <text x="70" y="435" class="label">• 수신자의 수신 윈도우 크기만큼 동시 전송 가능</text>

</svg>
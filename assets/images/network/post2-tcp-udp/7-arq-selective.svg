<svg width="750" height="450" viewBox="0 0 750 450" xmlns="http://www.w3.org/2000/svg">
  <style>
    body { background-color: #ffffff; }
    .bg { fill: #ffffff; }
    text { fill: #333; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 14px; }
    .label { font-size: 12px; }
    .title { font-size: 18px; font-weight: bold; }
    .subtitle { font-size: 13px; font-weight: 600; }
    .box { fill: #ffffff; stroke: #ddd; stroke-width: 2; rx: 8; }
    .header-cell { fill: #ffffff; stroke: #ddd; stroke-width: 1; }
    .arrow { stroke: #333; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
    .dashed { stroke-dasharray: 5,5; }
    .lost { stroke: #ff0000; stroke-width: 3; }
    .line { stroke: #333; stroke-width: 1; }
    .timeline { stroke: #333; stroke-width: 2; }
  </style>
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#333" />
    </marker>
  </defs>
  <rect class="bg" width="750" height="450"/>

  <text x="375" y="30" text-anchor="middle" class="title">ARQ: Selective Repeat</text>
  
  <!-- Sender and Receiver -->
  <text x="100" y="80" text-anchor="middle" class="subtitle">송신자</text>
  <text x="650" y="80" text-anchor="middle" class="subtitle">수신자</text>
  
  <!-- Segments sent -->
  <g id="segs-sent">
    <path d="M 120 120 L 630 120" class="arrow"/>
    <text x="200" y="110" text-anchor="middle" class="label">[1][2][3][4][5]</text>
  </g>
  
  <!-- Segment 3 lost -->
  <circle cx="380" cy="120" r="8" fill="none" stroke="#ff0000" stroke-width="2"/>
  <text x="380" y="125" text-anchor="middle" class="label" fill="#ff0000">X</text>
  
  <!-- NACK 3 back -->
  <g id="nack">
    <path d="M 630 170 L 120 170" class="arrow"/>
    <text x="375" y="160" text-anchor="middle" class="label">NACK 3</text>
  </g>
  
  <!-- Resend only 3 -->
  <g id="resend">
    <path d="M 120 220 L 630 220" class="arrow"/>
    <text x="280" y="210" text-anchor="middle" class="label">[3]</text>
  </g>
  
  <!-- Note -->
  <rect x="50" y="280" width="650" height="120" class="box"/>
  <text x="375" y="305" text-anchor="middle" class="label" font-weight="600">특징</text>
  <text x="70" y="330" class="label">• 오류 난 세그먼트만 재전송 (3)</text>
  <text x="70" y="355" class="label">• Go-Back-N보다 효율성 높음</text>
  <text x="70" y="380" class="label">• 수신 버퍼 크기와 관리 복잡도 증가</text>

</svg>
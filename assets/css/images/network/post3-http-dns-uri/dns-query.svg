<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="800" height="500" viewBox="0 0 800 500">
  <defs>
    <style>
      body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .title { font-size: 20px; font-weight: bold; fill: #333; }
      .subtitle { font-size: 14px; fill: #333; font-weight: 600; }
      .text { font-size: 13px; fill: #333; }
      .small { font-size: 11px; fill: #999; }
      .label { font-size: 12px; fill: #666; font-weight: 500; }
      .code { font-size: 12px; font-family: "Courier New", monospace; fill: #d73a49; }
      .arrow { fill: none; stroke: #333; stroke-width: 2; marker-end: url(#arrowhead); }
      .arrow-thick { fill: none; stroke: #333; stroke-width: 2.5; marker-end: url(#arrowhead); }
      .arrow-dashed { fill: none; stroke: #333; stroke-width: 2; stroke-dasharray: 5,5; marker-end: url(#arrowhead); }
      .box { fill: #fff; stroke: #ddd; stroke-width: 1.5; }
      .box-highlight { fill: #e8f4f8; stroke: #ddd; stroke-width: 1.5; }
      .box-response { fill: #f0f5e8; stroke: #ddd; stroke-width: 1.5; }
      .box-uri { fill: #fff3e0; stroke: #ddd; stroke-width: 1.5; }
      .box-dns { fill: #f3e5f5; stroke: #ddd; stroke-width: 1.5; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#333" />
    </marker>
  </defs>
<text x="400" y="35" text-anchor="middle" class="title">DNS 쿼리 과정</text><text x="60" y="100" text-anchor="start" class="text">① 클라이언트 → 로컬 네임서버</text><text x="60" y="125" text-anchor="start" class="text">   www.example.com IP 주소?</text><text x="60" y="175" text-anchor="start" class="text">② 로컬 → 루트 → TLD → 책임</text><text x="60" y="200" text-anchor="start" class="text">   (순차적으로 조회)</text><text x="60" y="250" text-anchor="start" class="text">③ 책임 네임서버 → 로컬</text><text x="60" y="275" text-anchor="start" class="text">   93.184.216.34</text><text x="60" y="325" text-anchor="start" class="text">④ 로컬 → 클라이언트</text><text x="60" y="350" text-anchor="start" class="text">   93.184.216.34 (캐시 저장)</text><rect x="50" y="350" width="700" height="120" rx="8" class="box-dns" /><text x="70" y="375" text-anchor="start" class="subtitle">쿼리 단계:</text><text x="70" y="400" text-anchor="start" class="code">클라이언트 → 로컬 → 루트 → TLD → 책임 → 로컬 → 클라이언트</text><text x="70" y="425" text-anchor="start" class="small">캐싱을 통해 이후 쿼리는 로컬 네임서버에서 바로 응답</text></svg>
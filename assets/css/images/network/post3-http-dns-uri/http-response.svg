<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="800" height="550" viewBox="0 0 800 550">
  <defs>
    <style>
      body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .title { font-size: 20px; font-weight: bold; fill: #333; }
      .subtitle { font-size: 14px; fill: #333; font-weight: 600; }
      .text { font-size: 13px; fill: #333; }
      .small { font-size: 11px; fill: #999; }
      .label { font-size: 12px; fill: #666; font-weight: 500; }
      .code { font-size: 12px; font-family: "Courier New", monospace; fill: #d73a49; }
      .arrow { fill: none; stroke: #333; stroke-width: 2; marker-end: url(#arrowhead); }
      .arrow-thick { fill: none; stroke: #333; stroke-width: 2.5; marker-end: url(#arrowhead); }
      .arrow-dashed { fill: none; stroke: #333; stroke-width: 2; stroke-dasharray: 5,5; marker-end: url(#arrowhead); }
      .box { fill: #fff; stroke: #ddd; stroke-width: 1.5; }
      .box-highlight { fill: #e8f4f8; stroke: #ddd; stroke-width: 1.5; }
      .box-response { fill: #f0f5e8; stroke: #ddd; stroke-width: 1.5; }
      .box-uri { fill: #fff3e0; stroke: #ddd; stroke-width: 1.5; }
      .box-dns { fill: #f3e5f5; stroke: #ddd; stroke-width: 1.5; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#333" />
    </marker>
  </defs>
<text x="400" y="35" text-anchor="middle" class="title">HTTP 응답 (Response) 구조</text><rect x="50" y="70" width="700" height="60" rx="8" class="box-response" /><text x="70" y="95" text-anchor="start" class="subtitle">상태 라인 (Status Line)</text><text x="70" y="120" text-anchor="start" class="code">HTTP/1.1 201 Created</text><text x="70" y="145" text-anchor="start" class="label">HTTP 버전</text><text x="280" y="145" text-anchor="start" class="label">상태 코드</text><text x="500" y="145" text-anchor="start" class="label">이유 구문 (Reason Phrase)</text><rect x="50" y="160" width="700" height="90" rx="8" class="box-response" /><text x="70" y="185" text-anchor="start" class="subtitle">헤더 필드 (Header Fields)</text><text x="70" y="210" text-anchor="start" class="code">Content-Type: application/json</text><text x="70" y="230" text-anchor="start" class="code">Location: /api/articles/42</text><text x="70" y="250" text-anchor="start" class="code">Content-Length: 45</text><rect x="50" y="270" width="700" height="30" rx="8" class="box" /><text x="70" y="290" text-anchor="start" class="label">빈 줄 (CRLF)</text><rect x="50" y="320" width="700" height="80" rx="8" class="box-response" /><text x="70" y="345" text-anchor="start" class="subtitle">메시지 바디 (Message Body)</text><text x="70" y="370" text-anchor="start" class="code">{ "id": 42, "title": "Spring Boot 시작" }</text><text x="70" y="390" text-anchor="start" class="small">응답 데이터 포함</text></svg>
<?xml version="1.0" encoding="UTF-8"?>
<svg width="900" height="300" viewBox="0 0 900 300" xmlns="http://www.w3.org/2000/svg">
    <rect width="900" height="300" fill="#fff"/>

    <defs>
        <style>
            body { font-family: '-apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif'; }
            .title { font-size: 18px; font-weight: 600; fill: #333; }
            .label { font-size: 14px; fill: #333; }
            .subtext { font-size: 12px; fill: #666; }
            .code { font-size: 12px; fill: #333; font-family: monospace; }
            .header { font-size: 16px; font-weight: 600; fill: #333; }
            .box { stroke: #ddd; stroke-width: 1.5; fill: #f9f9f9; rx: 8; }
            .box-header { stroke: #ddd; stroke-width: 1.5; fill: #f5f5f5; rx: 8; }
            .arrow { stroke: #666; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
            .dashed { stroke-dasharray: 5,5; }
            .text-center { text-anchor: middle; }
            .network-box { stroke: #999; stroke-width: 2; fill: #f9f9f9; rx: 8; }
            .address { font-size: 13px; font-family: monospace; fill: #333; }
        </style>
        <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
            <polygon points="0 0, 10 3, 0 6" fill="#666" />
        </marker>
    </defs>


    <!-- Title -->
    <text x="450" y="40" class="title text-center">라우팅 (Routing)</text>
    
    <!-- Network A -->
    <rect x="30" y="80" width="160" height="140" class="network-box"/>
    <text x="110" y="110" class="header text-center">네트워크 A</text>
    <text x="110" y="135" class="address text-center">10.0.1.0/24</text>
    <text x="110" y="195" class="subtext text-center">출발지</text>
    
    <!-- Router R1 -->
    <g id="router-r1">
        <rect x="220" y="80" width="160" height="140" class="network-box"/>
        <text x="300" y="110" class="header text-center">라우터 R1</text>
        <text x="300" y="135" class="subtext text-center">경로 선택</text>
        <line x1="230" y1="150" x2="370" y2="150" stroke="#999" stroke-width="1"/>
        <text x="300" y="170" class="subtext text-center">↑ 라우팅</text>
        <text x="300" y="190" class="subtext text-center">테이블 참조</text>
    </g>
    
    <!-- Router R2 -->
    <g id="router-r2">
        <rect x="410" y="80" width="160" height="140" class="network-box"/>
        <text x="490" y="110" class="header text-center">라우터 R2</text>
        <text x="490" y="135" class="subtext text-center">경로 선택</text>
        <line x1="420" y1="150" x2="560" y2="150" stroke="#999" stroke-width="1"/>
        <text x="490" y="170" class="subtext text-center">↑ 라우팅</text>
        <text x="490" y="190" class="subtext text-center">테이블 참조</text>
    </g>
    
    <!-- Network B -->
    <rect x="600" y="80" width="160" height="140" class="network-box"/>
    <text x="680" y="110" class="header text-center">네트워크 B</text>
    <text x="680" y="135" class="address text-center">10.0.2.0/24</text>
    <text x="680" y="195" class="subtext text-center">목적지</text>
    
    <!-- Arrows -->
    <line x1="190" y1="150" x2="220" y2="150" class="arrow"/>
    <line x1="380" y1="150" x2="410" y2="150" class="arrow"/>
    <line x1="570" y1="150" x2="600" y2="150" class="arrow"/>
</svg>
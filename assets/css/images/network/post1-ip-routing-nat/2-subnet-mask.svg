<?xml version="1.0" encoding="UTF-8"?>
<svg width="800" height="500" viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
    <rect width="800" height="500" fill="#fff"/>

    <defs>
        <style>
            body { font-family: '-apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif'; }
            .title { font-size: 18px; font-weight: 600; fill: #333; }
            .label { font-size: 14px; fill: #333; }
            .subtext { font-size: 12px; fill: #666; }
            .code { font-size: 12px; fill: #333; font-family: monospace; }
            .header { font-size: 16px; font-weight: 600; fill: #333; }
            .box { stroke: #ddd; stroke-width: 1.5; fill: #f9f9f9; rx: 8; }
            .box-header { stroke: #ddd; stroke-width: 1.5; fill: #f5f5f5; rx: 8; }
            .arrow { stroke: #666; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
            .dashed { stroke-dasharray: 5,5; }
            .text-center { text-anchor: middle; }
            .network-box { stroke: #999; stroke-width: 2; fill: #f9f9f9; rx: 8; }
            .address { font-size: 13px; font-family: monospace; fill: #333; }
        </style>
        <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
            <polygon points="0 0, 10 3, 0 6" fill="#666" />
        </marker>
    </defs>


    <!-- Title -->
    <text x="400" y="40" class="title text-center">서브넷 마스크와 CIDR</text>
    
    <!-- IP Address Line -->
    <text x="50" y="90" class="label">IP 주소:</text>
    <g id="ip-binary">
        <!-- 192 = 11000000 -->
        <rect x="200" y="75" width="100" height="40" class="box"/>
        <text x="250" y="105" class="code text-center">11000000</text>
        <text x="250" y="120" class="subtext text-center">192</text>
        
        <!-- 168 = 10101000 -->
        <rect x="320" y="75" width="100" height="40" class="box"/>
        <text x="370" y="105" class="code text-center">10101000</text>
        <text x="370" y="120" class="subtext text-center">168</text>
        
        <!-- 1 = 00000001 -->
        <rect x="440" y="75" width="100" height="40" class="box"/>
        <text x="490" y="105" class="code text-center">00000001</text>
        <text x="490" y="120" class="subtext text-center">1</text>
        
        <!-- 100 = 01100100 -->
        <rect x="560" y="75" width="100" height="40" class="box"/>
        <text x="610" y="105" class="code text-center">01100100</text>
        <text x="610" y="120" class="subtext text-center">100</text>
    </g>
    
    <!-- Subnet Mask Line -->
    <text x="50" y="195" class="label">서브넷 마스크:</text>
    <text x="200" y="195" class="code">11111111.11111111.11111111.00000000 = 255.255.255.0</text>
    
    <!-- Network and Host portions -->
    <g id="portions">
        <!-- Network portion indicator -->
        <line x1="200" y1="220" x2="440" y2="220" class="arrow" stroke="#0066cc"/>
        <text x="320" y="240" class="subtext" fill="#0066cc">네트워크 부분 (24비트)</text>
        
        <!-- Host portion indicator -->
        <line x1="560" y1="220" x2="660" y2="220" class="arrow" stroke="#cc6600"/>
        <text x="610" y="240" class="subtext" fill="#cc6600">호스트 (8비트)</text>
    </g>
    
    <!-- AND Operation -->
    <text x="50" y="290" class="label">AND 연산 결과:</text>
    <rect x="200" y="275" width="400" height="40" class="box"/>
    <text x="400" y="305" class="address text-center">네트워크 주소: 192.168.1.0</text>
    
    <!-- CIDR Notation -->
    <text x="50" y="380" class="label">CIDR 표기:</text>
    <rect x="200" y="365" width="400" height="40" class="box"/>
    <text x="400" y="395" class="address text-center">192.168.1.0/24</text>
    
    <!-- Explanation -->
    <text x="50" y="460" class="subtext">/24 = 처음 24비트는 네트워크, 나머지 8비트는 호스트 주소</text>
</svg>
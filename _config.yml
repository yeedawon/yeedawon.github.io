title: "DAWON's BLOG"
tagline: "AI / ML"
description: "wanna be a AI/ML Engineer"
url: "https://yeedawon.github.io"
baseurl: ""

author:
  name: Lee DaWon
  fullname: 이다원
  description: "wanna be a AI/ML Engineer"
  university: "건국대학교"
  major: "컴퓨터공학부/응용통계학과"
  github: yeedawon

permalink: /:categories/:year/:month/:day/:title/
markdown: kramdown
highlighter: rouge
kramdown:
  input: GFM
  syntax_highlighter: rouge

plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
      author: yeedawon

exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - "*.zip"

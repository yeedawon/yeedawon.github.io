---
layout: default
---
<article>
  <header class="post-hero">
    <h1>{{ page.title }}</h1>
    <div class="post-meta">
      <span>{{ page.date | date: "%Y.%m.%d" }}</span>
      {% if page.categories[0] == "springboot" %}
        <span class="badge badge-sb">Spring Boot</span>
      {% elsif page.categories[0] == "network" %}
        <span class="badge badge-net">Network</span>
      {% endif %}
      <span>by {{ page.author | default: site.author.name }}</span>
    </div>
  </header>
  <div class="post-body">
    {{ content }}
  </div>
  <div class="back-top"><a href="#">BACK TO TOP ↑</a></div>
</article>
